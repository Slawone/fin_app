<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мои финансы</title>
  </head>
  <body>
    <header>
      <div>
        <a href="/">Логотип</a>
        <nav>
          <ul>
            <li><a href="#">Обзор</a></li>
            <li><a href="#">Транзакции</a></li>
            <li><a href="#">Аналитика</a></li>
            <li><a href="#">Счета</a></li>
            <li><a href="#">Кошелёк</a></li>
          </ul>
        </nav>
        <div>
          <button>⚙</button>
          <button>🔔</button>
          <button>👤</button>
        </div>
      </div>
    </header>
    <main>
      <section>
        <h1>Привет, Вячеслав!</h1>
        <div>
          <button>Этот месяц</button>
          <button>Прошлый месяц</button>
          <button>Этот год</button>
          <button>Последние 12 мес.</button>
          <button>Выбрать период</button>
        </div>
      </section>
      <section>
        <div>
          <div>
            <p>Баланс</p>
            <p>$5,502.45</p>
            <p>+13,1%</p>
          </div>
          <div>
            <p>Доходы</p>
            <p>$9,450.00</p>
            <p>+3,7%</p>
          </div>
          <div>
            <p>Расходы</p>
            <p>$3,945.55</p>
            <p>−1,5%</p>
          </div>
        </div>
      </section>
      <section>
        <div>
          <button>
            <span>➕</span>
            <span>Добавить доход</span>
            <span>Создать доход вручную</span>
          </button>
          <button>
            <span>➖</span>
            <span>Добавить расход</span>
            <span>Создать расход вручную</span>
          </button>
          <button>
            <span>⇄</span>
            <span>Перевод</span>
            <span>Выберите сумму и сделайте перевод</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
